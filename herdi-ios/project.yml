name: Herdi
options:
  bundleIdPrefix: com.dcolinmorgan
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
targets:
  Herdi:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - Widget/**
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.dawson.herdi
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Herdi
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "Herdi discovers the relay daemon on your local network."
        NSBonjourServices:
          - _herdi._tcp
        NSSupportsLiveActivities: true
    entitlements:
      path: Sources/Herdi.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.dawson.herdi
    dependencies:
      - target: HerdiWidget
        embed: true

  HerdiWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/Widget
      - path: Sources/LiveActivity/HerdiWidgetAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dawson.herdi.widget
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Sources/HerdiWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.dawson.herdi
