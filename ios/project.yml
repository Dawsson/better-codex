name: BetterCodex
options:
  bundleIdPrefix: com.dawson
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
targets:
  BetterCodex:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - Widget/**
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.dawson.bettercodex
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Better Codex
        CFBundleURLTypes:
          - CFBundleURLName: com.dawson.bettercodex.configure
            CFBundleURLSchemes:
              - bettercodex
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "Better Codex connects to your Codex app-server on your private network."
        NSSupportsLiveActivities: true
    entitlements:
      path: Sources/BetterCodex.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.dawson.bettercodex
    dependencies:
      - target: BetterCodexWidget
        embed: true

  BetterCodexWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/Widget
      - path: Sources/LiveActivity/BetterCodexWidgetAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dawson.bettercodex.widget
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Sources/BetterCodexWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.dawson.bettercodex
